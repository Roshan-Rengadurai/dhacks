<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Terrain -- Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grain"></div>
    <main class="auth-page">
      <div class="auth-card">
        <p class="eyebrow">Terrain access</p>
        <h1>Welcome back</h1>
        <p class="lede">Log in to review your predictive terrain and scenario workspaces.</p>
        <form>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@terrain.studio" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="********" />
          </div>
          <button class="btn primary" type="submit">Login</button>
          <div class="form-footer">
            <a href="#">Forgot password?</a>
            <a href="signup.html">Need an account?</a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
